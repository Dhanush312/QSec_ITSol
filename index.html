<style>
  :root {
    /* Type */
    --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

    /* Neutrals — cool, subtly toned (Apple/Google restraint) */
    --bg:         oklch(0.992 0.002 260);
    --bg-2:       oklch(0.974 0.003 260);
    --surface:    oklch(1 0 0);
    --ink:        oklch(0.215 0.018 264);
    --ink-2:      oklch(0.455 0.015 264);
    --ink-3:      oklch(0.610 0.012 264);
    --border:     oklch(0.912 0.006 264);
    --border-2:   oklch(0.858 0.008 264);

    /* Accent — deep, trustworthy blue (tweakable) */
    --accent-l: 0.475; --accent-c: 0.165; --accent-h: 260;
    --accent:      oklch(var(--accent-l) var(--accent-c) var(--accent-h));
    --accent-700:  oklch(calc(var(--accent-l) - 0.07) var(--accent-c) var(--accent-h));
    --accent-300:  oklch(0.78 0.09 var(--accent-h));
    --accent-soft: oklch(0.965 0.022 var(--accent-h));
    --accent-line: oklch(0.90 0.04 var(--accent-h));

    --shadow-sm: 0 1px 2px oklch(0.2 0.03 264 / 0.04), 0 1px 3px oklch(0.2 0.03 264 / 0.05);
    --shadow-md: 0 4px 14px oklch(0.2 0.03 264 / 0.06), 0 2px 6px oklch(0.2 0.03 264 / 0.05);
    --shadow-lg: 0 24px 60px oklch(0.2 0.03 264 / 0.10), 0 8px 24px oklch(0.2 0.03 264 / 0.06);

    --maxw: 1180px;
    --radius: 18px;
    --radius-sm: 12px;
    --gutter: 24px;
    --section-y: 132px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: -0.011em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--accent-700); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.025em; line-height: 1.05; }
  p { margin: 0; }
  img, svg { display: block; }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }

  /* ---- Eyebrow / labels (mono) ---- */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-700);
  }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 9px;
    height: 50px; padding: 0 24px;
    border-radius: 999px;
    font-size: 15.5px; font-weight: 500; letter-spacing: -0.01em;
    border: 1px solid transparent;
    transition: transform .18s cubic-bezier(.2,.7,.3,1), background .18s, box-shadow .25s, border-color .18s, color .18s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 2px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / .35); }
  .btn-primary:hover { background: var(--accent-700); box-shadow: 0 10px 26px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / .30); transform: translateY(-1px); }
  .btn-ghost { background: var(--surface); color: var(--ink); border-color: var(--border-2); }
  .btn-ghost:hover { border-color: var(--ink-3); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn-text { background: transparent; color: var(--accent-700); padding: 0; height: auto; }
  .btn-text .arrow { transition: transform .2s; }
  .btn-text:hover .arrow { transform: translateX(4px); }

  /* ---- Section headings ---- */
  .sec { padding: var(--section-y) 0; }
  .sec-head { max-width: 720px; margin: 0 auto 64px; text-align: center; }
  .sec-head.left { margin-left: 0; text-align: left; }
  .sec-title { font-size: clamp(30px, 4.2vw, 46px); letter-spacing: -0.03em; margin-top: 18px; }
  .sec-sub { color: var(--ink-2); font-size: clamp(17px, 1.6vw, 19px); margin-top: 18px; line-height: 1.55; font-weight: 400; }

  /* ---- Scroll reveal ---- */
  [data-reveal] {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1);
    transition-delay: var(--reveal-delay, 0s);
  }
  [data-reveal][data-shown] { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    [data-reveal] { opacity: 1 !important; transform: none !important; }
    html { scroll-behavior: auto; }
  }

  .divider { height: 1px; background: var(--border); border: 0; margin: 0; }

  /* Placeholder visual treatment */
  .ph-grid {
    background-image:
      linear-gradient(oklch(0.5 0.02 264 / 0.05) 1px, transparent 1px),
      linear-gradient(90deg, oklch(0.5 0.02 264 / 0.05) 1px, transparent 1px);
    background-size: 26px 26px;
  }

  #root { overflow-x: clip; }

  /* ---- Drifting background washes (parallax depth) ---- */
  .bg-fx {
    position: absolute; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(70px); opacity: 0.5; will-change: transform;
  }
  .orb-1 { width: 620px; height: 620px; top: -160px; right: -140px;
    background: radial-gradient(circle at 30% 30%, oklch(0.86 0.09 var(--accent-h)), transparent 70%); }
  .orb-2 { width: 520px; height: 520px; top: 1100px; left: -200px;
    background: radial-gradient(circle at 50% 50%, oklch(0.88 0.07 calc(var(--accent-h) - 30)), transparent 70%); opacity: 0.4; }
  .orb-3 { width: 560px; height: 560px; top: 3000px; right: -180px;
    background: radial-gradient(circle at 50% 50%, oklch(0.89 0.06 calc(var(--accent-h) + 25)), transparent 70%); opacity: 0.38; }
  .orb-4 { width: 600px; height: 600px; top: 5200px; left: -160px;
    background: radial-gradient(circle at 50% 50%, oklch(0.87 0.08 var(--accent-h)), transparent 70%); opacity: 0.34; }

  main, .footer { position: relative; z-index: 1; }
</style>
